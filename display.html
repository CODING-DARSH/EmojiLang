<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmojiLang Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #041018;
      --panel: rgba(5, 19, 32, 0.86);
      --cyan: #40e0ff;
      --purple: #b026ff;
      --text: #d9f7ff;
      --muted: #7bb8c7;
      --border: rgba(64, 224, 255, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(64, 224, 255, 0.14), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(176, 38, 255, 0.18), transparent 24%),
        linear-gradient(135deg, #02070d 0%, #07131d 50%, #030812 100%);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }
    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 22px;
      min-height: 100vh;
      padding: 22px;
    }
    .hero,
    .board {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(64, 224, 255, 0.12);
    }
    .hero {
      padding: 26px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(64, 224, 255, 0.08), transparent 35%, rgba(176, 38, 255, 0.05));
      pointer-events: none;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      color: var(--muted);
      font-size: 18px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .title {
      margin: 8px 0 0;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 0.95;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(64, 224, 255, 0.24);
    }
    .clock {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      color: var(--cyan);
      white-space: nowrap;
    }
    .dataset-card {
      margin: auto 0;
      min-height: 58vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .dataset-id {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .dataset-emojis {
      margin: 24px 0;
      font-size: clamp(72px, 12vw, 160px);
      line-height: 1.05;
      filter: drop-shadow(0 0 32px rgba(64, 224, 255, 0.28));
    }
    .dataset-name {
      font-size: clamp(28px, 4.2vw, 56px);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .dataset-status {
      margin-top: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .standby {
      color: var(--muted);
    }
    .board {
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .board-title {
      font-size: 28px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 16px;
    }
    .launch-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .launch-card {
      display: block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(64, 224, 255, 0.18);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .launch-card:hover {
      transform: translateY(-2px);
      border-color: rgba(64, 224, 255, 0.45);
      box-shadow: 0 0 20px rgba(64, 224, 255, 0.12);
    }
    .launch-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .launch-name {
      margin-top: 6px;
      font-size: 22px;
      text-transform: uppercase;
    }
    .launch-path {
      margin-top: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--cyan);
    }
    .board-list {
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-right: 4px;
    }
    .team-card {
      border: 1px solid rgba(64, 224, 255, 0.16);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.16);
    }
    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }
    .team-name {
      font-size: 24px;
      text-transform: uppercase;
    }
    .team-score {
      font-family: 'Space Mono', monospace;
      font-size: 24px;
      color: var(--cyan);
    }
    .bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(64, 224, 255, 0.1);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--cyan));
    }
    .team-meta {
      margin-top: 8px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        overflow: auto;
      }
      .dataset-card {
        min-height: 46vh;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">AI First Algorithm Arena</div>
          <h1 class="title">Projector Display</h1>
        </div>
        <div class="clock" id="display-clock">00:00:00</div>
      </div>

      <div class="dataset-card" id="dataset-card">
        <div class="standby">
          <div class="dataset-id">Awaiting Broadcast</div>
          <div class="dataset-emojis">📡</div>
          <div class="dataset-name">Stand By</div>
          <div class="dataset-status">Admin flash events will appear here in real time.</div>
        </div>
      </div>
    </section>

    <aside class="board">
      <div class="board-title">Leaderboard</div>
      <div class="launch-strip">
        <a class="launch-card" href="/evaluation" target="_blank" rel="noreferrer">
          <div class="launch-label">Admin</div>
          <div class="launch-name">Control Panel</div>
          <div class="launch-path">/evaluation</div>
        </a>
        <a class="launch-card" href="/participant" target="_blank" rel="noreferrer">
          <div class="launch-label">Students</div>
          <div class="launch-name">Coding IDE</div>
          <div class="launch-path">/participant</div>
        </a>
      </div>
      <div class="board-list" id="board-list"></div>
    </aside>
  </main>

  <script>
    let lastFlashTs = null;
    let lastBoardTs = null;

    function startClock() {
      const el = document.getElementById('display-clock');
      setInterval(() => {
        el.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
      }, 1000);
    }

    function connectStream(url, handler) {
      const stream = new EventSource(url);
      stream.onmessage = (event) => {
        if (!event || !event.data) return;
        try {
          handler(JSON.parse(event.data));
        } catch (_err) {
        }
      };
      stream.onerror = () => {
        console.log('[display] reconnecting', url);
      };
      return stream;
    }

    async function fetchInitial(url, handler) {
      try {
        const response = await fetch(url);
        if (!response.ok) return;
        const data = await response.json();
        handler((data || {}).state || {});
      } catch (_err) {
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderFlash(state) {
      if (!state || !state.moduleId) return;
      if (lastFlashTs && state.ts && lastFlashTs === state.ts) return;
      lastFlashTs = state.ts || String(Date.now());

      const card = document.getElementById('dataset-card');
      card.innerHTML = `
        <div class="dataset-id">${escapeHtml(state.moduleId)}</div>
        <div class="dataset-emojis">${escapeHtml(state.emojis || '❓ ❓ ❓')}</div>
        <div class="dataset-name">${escapeHtml(state.name || 'Hidden Variables')}</div>
        <div class="dataset-status">Live broadcast synced from admin control.</div>
      `;
    }

    function renderBoard(state) {
      if (!state) return;
      if (lastBoardTs && state.ts && lastBoardTs === state.ts) return;
      lastBoardTs = state.ts || String(Date.now());

      const teams = Array.isArray(state.teams) ? [...state.teams] : [];
      const sorted = teams.sort((a, b) => (b.score || 0) - (a.score || 0));
      const maxScore = Math.max(100, ...sorted.map(team => team.score || 0));
      const list = document.getElementById('board-list');

      if (!sorted.length) {
        list.innerHTML = '<div class="team-meta">No teams registered yet.</div>';
        return;
      }

      list.innerHTML = sorted.map((team, index) => {
        const width = Math.max(6, Math.min(100, ((team.score || 0) / maxScore) * 100));
        return `
          <div class="team-card">
            <div class="team-row">
              <div class="team-name">${index + 1}. ${escapeHtml(team.name)}</div>
              <div class="team-score">${team.score || 0}</div>
            </div>
            <div class="bar"><div class="bar-fill" style="width:${width}%"></div></div>
            <div class="team-meta">Datasets solved: ${team.patches || 0}</div>
          </div>
        `;
      }).join('');
    }

    startClock();
    fetchInitial('/api/flash/state', renderFlash);
    fetchInitial('/api/leaderboard/state', renderBoard);
    connectStream('/api/flash/events', renderFlash);
    connectStream('/api/leaderboard/events', renderBoard);
  </script>
</body>
</html>
